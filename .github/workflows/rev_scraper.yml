name: IR Scraper

on:
  schedule:
    - cron: '10 7 * * *'   # 07:10 UTC = 12:40 AM IST
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual run reason'
        required: false
        default: 'Manual trigger'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read      # read-only — no git push needed, HF handles storage

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2 libcups2 || true

      - name: Install Python packages
        run: pip install playwright huggingface_hub

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium || true

      # ── Attempt 1 ──────────────────────────────────────────────────────
      - name: Run scraper (attempt 1)
        id: attempt1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/rev_scraper.py
        continue-on-error: true

      # ── Attempt 2 (only if attempt 1 failed) ───────────────────────────
      - name: Run scraper (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/rev_scraper.py
        continue-on-error: true

      # ── Attempt 3 (only if 1 & 2 failed) ───────────────────────────────
      - name: Run scraper (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/rev_scraper.py

      # ── Final status ────────────────────────────────────────────────────
      - name: Report outcome
        if: always()
        run: |
          echo "Attempt 1: ${{ steps.attempt1.outcome }}"
          echo "Attempt 2: ${{ steps.attempt2.outcome }}"
          echo "Attempt 3: ${{ steps.attempt3.outcome }}"
