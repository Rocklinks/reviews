# _scrape_job.yml — Reusable workflow called by scrape.yml
# Receives ist_hour (hardcoded per job) so detection is never needed.

name: _Scrape Job (reusable)

on:
  workflow_call:
    inputs:
      ist_hour:
        required: true
        type: string
      method:
        required: false
        type: string
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps
        continue-on-error: true

      - name: Install Brave browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apt-transport-https curl
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
            https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] \
            https://brave-browser-apt-release.s3.brave.com/ stable main" \
            | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt-get update -qq
          sudo apt-get install -y brave-browser
        continue-on-error: true

      - name: Install Xvfb and xdotool
        run: sudo apt-get install -y xvfb xdotool
        continue-on-error: true

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
        continue-on-error: true

      - name: Install ChromeDriver
        run: sudo apt-get install -y chromium-browser chromium-chromedriver || true
        continue-on-error: true

      - name: Run scraper (IST hour = ${{ inputs.ist_hour }})
        env:
          DISPLAY: ":99"
        run: |
          CMD="python main.py --hour ${{ inputs.ist_hour }}"
          if [ -n "${{ inputs.method }}" ]; then
            CMD="$CMD --method ${{ inputs.method }}"
          fi
          echo "Command: $CMD"
          $CMD

      - name: Pull latest then commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add rev.json deleted.json || true
          git diff --staged --quiet && echo "No new reviews." && exit 0
          IST_LABEL=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %H:%M IST")
          git commit -m "scrape: ${IST_LABEL} (IST hour=${{ inputs.ist_hour }}) [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
