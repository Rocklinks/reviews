name: IR Scraper

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 18 * * *'  # 12:00 AM IST (next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important for proper git diff and commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for Chromium/Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            chromium-browser \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libcups2 || true

      - name: Install Playwright and browsers
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Scraper
        run: python scraper.py
        env:
          CI: true

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add docs/rev.json docs/deleted.json
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update Reviews $(date '+%Y-%m-%d %H:%M:%S IST')"
            git push
          fi
