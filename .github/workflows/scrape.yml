name: Sathya Reviews Scraper

on:
  # Runs every day at 6 AM, 12 PM, 6 PM, 12 AM (IST offset is +5:30)
  # To run at 06:30 UTC is 12:00 PM IST. 
  # Your request said 6am, 12pm, 6pm, 12am IST.
  # IST = UTC+5:30.
  # 12am IST = 18:30 UTC previous day.
  # 6am IST = 00:30 UTC.
  # 12pm IST = 06:30 UTC.
  # 6pm IST = 12:30 UTC.
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST
    - cron: '30 6 * * *'  # 12:00 PM IST
    - cron: '30 12 * * *' # 6:00 PM IST
    - cron: '30 18 * * *' # 12:00 AM IST (Next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
          
      - name: Run Scraper
        run: python scraper.py
        env:
          CI: true # Helps some browsers identify environment correctly

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/rev.json docs/deleted.json
          git diff --staged --quiet || git commit -m "🔄 Update Reviews $(date '+%Y-%m-%d %H:%M')"
          git push
        continue-on-error: false
