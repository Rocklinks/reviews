name: IR Scraper

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST
    - cron: '30 6 * * *'   # 12:00 IST
    - cron: '30 12 * * *'  # 18:00 IST
    - cron: '30 18 * * *'  # 00:00 IST (next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      # ── Cache Playwright browsers ────────────────────────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-playwright-chromium-

      # ── System deps for Ubuntu 24.04 (t64 packages) ─────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libcups2t64 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0t64 \
            libnspr4 libnss3 libxcomposite1 libxdamage1 libxext6 \
            libxfixes3 libxkbcommon0 libxrandr2 libxshmfence1 libxss1 libxtst6 \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libglib2.0-0t64 \
            libxcb1 libx11-6 fonts-liberation fonts-noto-color-emoji \
            libxcursor1 libxi6 libxrender1 libxtst6

      # ── Install Chromium + dependencies ─────────────────────────────────────
      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          # Only run install-deps if cache was not hit (to avoid redundant work)
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install-deps chromium
          fi

      # ── Run scraper ──────────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py
        env:
          CI: true
          LANG: en_US.UTF-8

      # ── Commit & push ────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/rev.json docs/deleted.json
          git diff --staged --quiet || \
            git commit -m "🔄 Reviews $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
