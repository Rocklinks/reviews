name: Tri Hourly Scraper
on:
  schedule:
    - cron: '30 0 * * *'    # 06:00 IST
    - cron: '30 3 * * *'    # 09:00 IST
    - cron: '30 6 * * *'    # 12:00 IST
    - cron: '30 9 * * *'    # 15:00 IST
    - cron: '30 12 * * *'   # 18:00 IST
    - cron: '30 15 * * *'   # 21:00 IST
    - cron: '30 18 * * *'   # 00:00 IST
    - cron: '30 21 * * *'   # 03:00 IST
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # ← reduced from 55, no Chrome needed
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests   # ← just this, no selenium, no chrome

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rev.json docs/deleted.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          LIVE=$(python -c "import json; print(len(json.load(open('docs/rev.json'))))" || echo 0)
          DEL=$(python -c "import json; print(len(json.load(open('docs/deleted.json'))))" || echo 0)
          git commit -m "data: ${NOW} | live=${LIVE} deleted=${DEL}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
