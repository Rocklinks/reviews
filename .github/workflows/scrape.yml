name: Sathya Reviews Scraper

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST
    - cron: '30 6 * * *'   # 12:00 IST
    - cron: '30 12 * * *'  # 18:00 IST
    - cron: '30 18 * * *'  # 00:00 IST (next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      # ── Cache Playwright browsers for faster runs ───────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      # ── Install Chromium browser + all its system dependencies ──────────────
      - name: Install Playwright Chromium with dependencies
        run: |
          playwright install --with-deps chromium

      # ── Run the scraper ─────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py
        env:
          CI: true
          # Force English locale so "Reviews" tab text is consistent
          LANG: en_US.UTF-8

      # ── Commit and push updated files ───────────────────────────────────────
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add docs/rev.json docs/deleted.json
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Reviews $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
