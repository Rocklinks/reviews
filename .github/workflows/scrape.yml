name: Sathya Agency Review Scraper

# ─── Cron time calculation ─────────────────────────────────────────────────────
# IST = UTC + 5:30
# To land AT the target IST time, schedule at: IST_target − 5h30m (UTC)
#
# IST target   UTC cron    Expected runner start (IST)
# ────────────────────────────────────────────────────
# 10:00 AM  →  04:30 UTC   ~10:00–10:15 AM IST ✓
# 04:00 PM  →  10:30 UTC   ~04:00–04:15 PM IST ✓
# 08:00 PM  →  14:30 UTC   ~08:00–08:15 PM IST ✓
# 12:00 AM  →  18:30 UTC   ~12:00–12:15 AM IST ✓
#
# IST hour is HARDCODED per job so it is always correct.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 4  * * *"   # fires ~10:00 AM IST
    - cron: "30 10 * * *"   # fires ~04:00 PM IST
    - cron: "30 14 * * *"   # fires ~08:00 PM IST
    - cron: "30 18 * * *"   # fires ~12:00 AM IST (midnight)

  workflow_dispatch:
    inputs:
      ist_hour:
        description: "IST hour to simulate (0=midnight, 10=10am, 16=4pm, 20=8pm)"
        required: true
        default: "10"
        type: choice
        options: ["0", "10", "16", "20"]
      method:
        description: "Force a specific scraper method (leave blank for auto)"
        required: false
        default: ""

jobs:
  # ── 10:00 AM IST run ─────────────────────────────────────────────────────────
  scrape-10am:
    name: "Scrape — 10:00 AM IST"
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ist_hour == '10') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *')
    uses: ./.github/workflows/_scrape_job.yml
    with:
      ist_hour: "10"
      method: ${{ inputs.method || '' }}
    secrets: inherit

  # ── 04:00 PM IST run ─────────────────────────────────────────────────────────
  scrape-4pm:
    name: "Scrape — 4:00 PM IST"
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ist_hour == '16') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 10 * * *')
    uses: ./.github/workflows/_scrape_job.yml
    with:
      ist_hour: "16"
      method: ${{ inputs.method || '' }}
    secrets: inherit

  # ── 08:00 PM IST run ─────────────────────────────────────────────────────────
  scrape-8pm:
    name: "Scrape — 8:00 PM IST"
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ist_hour == '20') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 14 * * *')
    uses: ./.github/workflows/_scrape_job.yml
    with:
      ist_hour: "20"
      method: ${{ inputs.method || '' }}
    secrets: inherit

  # ── 12:00 AM IST run (midnight) ──────────────────────────────────────────────
  scrape-midnight:
    name: "Scrape — 12:00 AM IST (midnight)"
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ist_hour == '0') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 18 * * *')
    uses: ./.github/workflows/_scrape_job.yml
    with:
      ist_hour: "0"
      method: ${{ inputs.method || '' }}
    secrets: inherit
