name: Sathya Reviews Scraper
on:
  schedule:
    - cron: '30 0 * * *' # 6:00 AM IST
    - cron: '30 6 * * *' # 12:00 PM IST
    - cron: '30 12 * * *' # 6:00 PM IST
    - cron: '30 18 * * *' # 12:00 AM IST (next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      # Playwright Browser Caching
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

       - name: Install system dependencies for Chromium/Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            chromium-browser \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 \
            libcairo2 libcups2 || true

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium || true

      - name: Run Scraper
        run: python scraper.py
        env:
          CI: true

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/rev.json docs/deleted.json
          git diff --staged --quiet || git commit -m "🔄 Update Reviews $(date '+%Y-%m-%d %H:%M')"
          git push
