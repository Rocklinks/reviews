name: SR Scraper
on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST
    - cron: '30 6 * * *'   # 12:00 IST
    - cron: '30 12 * * *'  # 18:00 IST
    - cron: '30 18 * * *'  # 00:00 IST (midnight slot → snap_date = yesterday)
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install playwright==1.44.0

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-1.44.0
          restore-keys: ${{ runner.os }}-playwright-chromium-

      # Install ALL Ubuntu 24.04 system libs manually (avoids playwright install-deps conflict)
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libcups2t64 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0t64 \
            libnspr4 libnss3 libxcomposite1 libxdamage1 libxext6 \
            libxfixes3 libxkbcommon0 libxrandr2 libxshmfence1 libxss1 libxtst6 \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libglib2.0-0t64 \
            libxcb1 libx11-6 fonts-liberation fonts-noto-color-emoji \
            libegl1 libgl1 libgles2

      # Install ONLY the browser binary — NO install-deps (avoids libasound2 conflict)
      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run scraper
        run: python scraper.py
        env:
          CI: true
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      # Upload debug folder so you can inspect screenshots + DOM dumps
      - name: Upload debug artifacts
        if: always()   # upload even if scraper fails
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: debug/
          retention-days: 7

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/rev.json docs/deleted.json
          git diff --staged --quiet || (
            git commit -m "🔄 Reviews $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push
          )
