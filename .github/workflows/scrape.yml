name: Sathya Reviews Scraper

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 18 * * *'  # 12:00 AM IST (next day)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      # Playwright Browser Caching
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ←←← Critical Fix: Install t64 packages FIRST (before any playwright command)
      - name: Install System Dependencies (Ubuntu 24.04+ compatible)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0t64 \
            libatspi2.0-0t64 \
            libcups2t64 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0t64 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxshmfence1 \
            libxss1 \
            libxtst6 \
            fonts-liberation \
            fonts-noto-color-emoji

      - name: Install Playwright Browsers
        run: |
          # Install browser only (do NOT let it install deps automatically)
          playwright install chromium

          # Run install-deps only if cache miss (and it should now succeed)
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install-deps chromium
          fi

      - name: Run Scraper
        run: python scraper.py
        env:
          CI: true

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/rev.json docs/deleted.json
          git diff --staged --quiet || git commit -m "🔄 Update Reviews $(date '+%Y-%m-%d %H:%M')"
          git push
