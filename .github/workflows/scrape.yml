name: Sathya Reviews Scraper

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'   # IST 6:00 AM, 12:00 PM, 6:00 PM, 12:00 AM
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Scraper
        run: python scraper_playwright_hardened.py

      - name: Commit and push updated JSON files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "action@github.com"
          git add docs/rev.json docs/deleted.json
          git commit -m "Update reviews - $(date '+%Y-%m-%d %H:%M IST')" || echo "No changes"
          git push
        continue-on-error: true
