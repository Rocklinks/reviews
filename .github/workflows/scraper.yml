name: SA Scraper

on:
  schedule:
    - cron: "30 18 * * *"   # 12:00 AM IST
  workflow_dispatch:

jobs:
  scrape:
    name: "Scrape — Midnight IST"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python -m playwright install chromium --with-deps
        continue-on-error: true

      - name: Install Brave
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apt-transport-https curl
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
            https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] \
            https://brave-browser-apt-release.s3.brave.com/ stable main" \
            | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt-get update -qq
          sudo apt-get install -y brave-browser

      - name: Start Xvfb
        continue-on-error: true
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - run: sudo apt-get install -y chromium-browser || true
        continue-on-error: true

      - name: Run scraper
        env:
          DISPLAY: ":99"
        run: python scraper.py --force

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add rev.json deleted.json || true
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "scrape: $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST') [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
